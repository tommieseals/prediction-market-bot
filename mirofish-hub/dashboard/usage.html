<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Usage Dashboard - Clawd</title>
    <meta http-equiv="refresh" content="300">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav-brand h1 {
            font-size: 1.8rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .nav-link.active {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-header h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .page-header p {
            opacity: 0.8;
        }

        .last-updated {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 10px;
        }

        .usage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .usage-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .usage-card.warning {
            border-color: #ffc107;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
        }

        .usage-card.danger {
            border-color: #dc3545;
            box-shadow: 0 0 20px rgba(220, 53, 69, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
        }

        .usage-numbers {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 12px;
        }

        .current-usage {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .usage-limit {
            font-size: 1.1rem;
            opacity: 0.6;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease, background 0.3s ease;
        }

        .progress-bar.green {
            background: linear-gradient(90deg, #00ff88, #00d2ff);
        }

        .progress-bar.yellow {
            background: linear-gradient(90deg, #ffc107, #ff9800);
        }

        .progress-bar.red {
            background: linear-gradient(90deg, #dc3545, #ff6b6b);
        }

        .percentage {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .card-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .tokens-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .tokens-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .tokens-header h3 {
            font-size: 1.3rem;
        }

        .token-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .token-stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .token-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00ff88;
        }

        .token-label {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        .refresh-info {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .nav-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-links {
                width: 100%;
                justify-content: flex-start;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 5px;
            }

            .nav-link {
                white-space: nowrap;
                padding: 6px 10px;
                font-size: 0.85rem;
            }

            .page-header h2 {
                font-size: 1.5rem;
            }

            .usage-grid {
                grid-template-columns: 1fr;
            }

            .usage-card {
                padding: 18px;
            }

            .current-usage {
                font-size: 2rem;
            }

            .token-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-brand">
                <h1>Clawd</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/infrastructure.html" class="nav-link">Infrastructure</a>
                <a href="/agents.html" class="nav-link">Agents</a>
                <a href="/apis.html" class="nav-link">APIs</a>
                <a href="/usage.html" class="nav-link active">Usage</a>
                <a href="/tools.html" class="nav-link">Tools</a>
            <a href="/whales" class="nav-link">🐋 Whales</a>
        </div>
        </nav>

        <div class="page-header">
            <h2>API Usage Dashboard</h2>
            <p>Monitor your daily API limits and token consumption</p>
            <p class="last-updated" id="lastUpdated">Loading...</p>
        </div>

        <div class="usage-grid" id="usageGrid">
            <!-- Cards populated by JavaScript -->
        </div>

        <div class="tokens-section">
            <div class="tokens-header">
                <h3>Token Usage (Today)</h3>
            </div>
            <div class="token-stats" id="tokenStats">
                <!-- Token stats populated by JavaScript -->
            </div>
        </div>

        <div class="refresh-info">
            Auto-refreshes every 5 minutes
            <button class="refresh-btn" onclick="loadUsageData()">Refresh Now</button>
        </div>
    </div>

    <script>
        const API_CONFIGS = [
            {
                id: 'nvidia',
                name: 'NVIDIA API',
                icon: 'GPU',
                description: 'Kimi, Llama, Qwen models (shared limit)',
                valueKey: 'calls',
                limitKey: 'limit'
            },
            {
                id: 'hunter',
                name: 'Hunter.io',
                icon: 'MAIL',
                description: 'Email finder searches',
                valueKey: 'searches',
                limitKey: 'limit'
            },
            {
                id: 'resend',
                name: 'Resend',
                icon: 'SEND',
                description: 'Transactional emails sent',
                valueKey: 'emails',
                limitKey: 'limit'
            },
            {
                id: 'openweathermap',
                name: 'OpenWeatherMap',
                icon: 'WX',
                description: 'Weather API calls',
                valueKey: 'calls',
                limitKey: 'limit'
            }
        ];

        function getProgressColor(percentage) {
            if (percentage >= 90) return 'red';
            if (percentage >= 80) return 'yellow';
            return 'green';
        }

        function getCardClass(percentage) {
            if (percentage >= 90) return 'danger';
            if (percentage >= 80) return 'warning';
            return '';
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function createUsageCard(config, data) {
            const apiData = data[config.id] || { [config.valueKey]: 0, [config.limitKey]: 100 };
            const current = apiData[config.valueKey] || 0;
            const limit = apiData[config.limitKey] || 100;
            const percentage = Math.min((current / limit) * 100, 100);
            const progressColor = getProgressColor(percentage);
            const cardClass = getCardClass(percentage);
            const lastUpdated = apiData.lastUpdated ? new Date(apiData.lastUpdated).toLocaleTimeString() : 'Never';

            return '<div class="usage-card ' + cardClass + '">' +
                '<div class="card-header">' +
                    '<span class="card-title">' + config.name + '</span>' +
                    '<div class="card-icon">' + config.icon + '</div>' +
                '</div>' +
                '<div class="usage-numbers">' +
                    '<span class="current-usage">' + formatNumber(current) + '</span>' +
                    '<span class="usage-limit">/ ' + formatNumber(limit) + '</span>' +
                '</div>' +
                '<div class="progress-container">' +
                    '<div class="progress-bar ' + progressColor + '" style="width: ' + percentage + '%"></div>' +
                '</div>' +
                '<div class="percentage">' + percentage.toFixed(1) + '% used</div>' +
                '<div class="card-footer">' + config.description + '</div>' +
            '</div>';
        }

        function createTokenStats(tokens) {
            const inputTokens = tokens && tokens.input ? tokens.input : 0;
            const outputTokens = tokens && tokens.output ? tokens.output : 0;
            const totalTokens = tokens && tokens.total ? tokens.total : (inputTokens + outputTokens);

            return '<div class="token-stat">' +
                    '<div class="token-value">' + formatNumber(inputTokens) + '</div>' +
                    '<div class="token-label">Input Tokens</div>' +
                '</div>' +
                '<div class="token-stat">' +
                    '<div class="token-value">' + formatNumber(outputTokens) + '</div>' +
                    '<div class="token-label">Output Tokens</div>' +
                '</div>' +
                '<div class="token-stat">' +
                    '<div class="token-value">' + formatNumber(totalTokens) + '</div>' +
                    '<div class="token-label">Total Tokens</div>' +
                '</div>';
        }

        function loadUsageData() {
            fetch('/data/api-usage.json?' + Date.now())
                .then(function(response) {
                    if (!response.ok) throw new Error('Failed to fetch');
                    return response.json();
                })
                .then(function(data) {
                    // Render usage cards
                    var grid = document.getElementById('usageGrid');
                    var html = '';
                    for (var i = 0; i < API_CONFIGS.length; i++) {
                        html += createUsageCard(API_CONFIGS[i], data);
                    }
                    grid.innerHTML = html;
                    
                    // Render token stats
                    var tokenStatsEl = document.getElementById('tokenStats');
                    tokenStatsEl.innerHTML = createTokenStats(data.tokens);
                    
                    // Update timestamp
                    var lastUpdatedEl = document.getElementById('lastUpdated');
                    lastUpdatedEl.textContent = 'Last updated: ' + new Date().toLocaleString() + ' (Date: ' + data.date + ')';
                })
                .catch(function(error) {
                    console.error('Error loading usage data:', error);
                    // Show placeholder data
                    var grid = document.getElementById('usageGrid');
                    var placeholderData = {
                        nvidia: { calls: 0, limit: 50 },
                        hunter: { searches: 0, limit: 50 },
                        resend: { emails: 0, limit: 100 },
                        openweathermap: { calls: 0, limit: 1000 },
                        tokens: { input: 0, output: 0, total: 0 }
                    };
                    var html = '';
                    for (var i = 0; i < API_CONFIGS.length; i++) {
                        html += createUsageCard(API_CONFIGS[i], placeholderData);
                    }
                    grid.innerHTML = html;
                    
                    var tokenStatsEl = document.getElementById('tokenStats');
                    tokenStatsEl.innerHTML = createTokenStats(placeholderData.tokens);
                    
                    var lastUpdatedEl = document.getElementById('lastUpdated');
                    lastUpdatedEl.textContent = 'Data unavailable - showing defaults';
                });
        }

        // Load data on page load
        loadUsageData();
        
        // Also refresh every 5 minutes via JavaScript (backup to meta refresh)
        setInterval(loadUsageData, 300000);
    </script>
</body>
</html>
