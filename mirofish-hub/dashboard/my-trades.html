<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Trades - Clawd Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
            color: #E2E8F0;
            min-height: 100vh;
        }
        nav {
            background: rgba(26, 32, 44, 0.95);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4A5568;
        }
        .nav-brand h1 { color: #48BB78; font-size: 1.5rem; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a {
            color: #A0AEC0;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: #2D3748;
            color: #48BB78;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(45, 55, 72, 0.8);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #4A5568;
        }
        .stat-value { font-size: 2rem; font-weight: bold; color: #48BB78; }
        .stat-value.negative { color: #FC8181; }
        .stat-label { color: #A0AEC0; margin-top: 5px; }
        .trades-table {
            background: rgba(45, 55, 72, 0.8);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #4A5568;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #4A5568; }
        th { background: #2D3748; color: #48BB78; font-weight: 600; }
        tr:hover { background: rgba(72, 187, 120, 0.1); }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-pending { background: #ECC94B; color: #1A202C; }
        .badge-won { background: #48BB78; color: #1A202C; }
        .badge-lost { background: #FC8181; color: #1A202C; }
        .badge-cancelled { background: #718096; color: #1A202C; }
        .pnl-positive { color: #48BB78; font-weight: 600; }
        .pnl-negative { color: #FC8181; font-weight: 600; }
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .refresh-btn {
            background: #48BB78;
            color: #1A202C;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .refresh-btn:hover { background: #38A169; }
        .last-update { color: #718096; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand"><h1>💰 My Trades</h1></div>
        <div class="nav-links">
            <a href="/">🏠 Dashboard</a>
            <a href="/consensus">🎯 Consensus</a>
            <a href="/whales">🐋 Whales</a>
            <a href="/terminator">🤖 Terminator</a>
            <a href="/my-trades" class="active">💵 My Trades</a>
        </div>
    </nav>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function MyTradesDashboard() {
            const [trades, setTrades] = useState([]);
            const [stats, setStats] = useState({ won: 0, lost: 0, pending: 0, total_pnl: 0 });
            const [loading, setLoading] = useState(true);
            const [lastUpdate, setLastUpdate] = useState(new Date());

            const fetchTrades = async () => {
                setLoading(true);
                try {
                    const res = await fetch('/api/my-trades');
                    if (res.ok) {
                        const data = await res.json();
                        setTrades(data.trades || []);
                        // Stats are in data.summary from the API
                        const summary = data.summary || {};
                        setStats({
                            won: summary.won || 0,
                            lost: summary.lost || 0,
                            pending: summary.pending || 0,
                            total_pnl: summary.total_pnl || 0
                        });
                    }
                    setLastUpdate(new Date());
                } catch (err) {
                    console.error('Fetch error:', err);
                }
                setLoading(false);
            };

            useEffect(() => {
                fetchTrades();
                const interval = setInterval(fetchTrades, 60000);
                return () => clearInterval(interval);
            }, []);

            const totalInvested = trades.filter(t => t.outcome === 'pending').reduce((sum, t) => sum + (t.cost || 0), 0);
            const potentialPayout = trades.filter(t => t.outcome === 'pending').reduce((sum, t) => sum + (t.shares || 0), 0);

            return (
                <div className="container">
                    <div className="header-section">
                        <div>
                            <h2 style={{color: '#48BB78', marginBottom: '5px'}}>📊 Trade Tracker</h2>
                            <span className="last-update">Last updated: {lastUpdate.toLocaleTimeString()}</span>
                        </div>
                        <button className="refresh-btn" onClick={fetchTrades}>
                            {loading ? '⏳ Loading...' : '🔄 Refresh'}
                        </button>
                    </div>

                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-value">{stats.pending}</div>
                            <div className="stat-label">⏳ Pending</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">{stats.won}</div>
                            <div className="stat-label">✅ Won</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">{stats.lost}</div>
                            <div className="stat-label">❌ Lost</div>
                        </div>
                        <div className="stat-card">
                            <div className={`stat-value ${stats.total_pnl >= 0 ? '' : 'negative'}`}>
                                ${stats.total_pnl.toFixed(2)}
                            </div>
                            <div className="stat-label">💰 Total P&L</div>
                        </div>
                    </div>

                    <div className="stats-grid" style={{gridTemplateColumns: 'repeat(2, 1fr)'}}>
                        <div className="stat-card">
                            <div className="stat-value">${totalInvested.toFixed(2)}</div>
                            <div className="stat-label">🎯 Active Risk</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">${potentialPayout.toFixed(2)}</div>
                            <div className="stat-label">🎰 Potential Payout</div>
                        </div>
                    </div>

                    <div className="trades-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Market</th>
                                    <th>Side</th>
                                    <th>Entry</th>
                                    <th>Shares</th>
                                    <th>Cost</th>
                                    <th>Status</th>
                                    <th>P&L</th>
                                    <th>Notes</th>
                                </tr>
                            </thead>
                            <tbody>
                                {trades.map(trade => (
                                    <tr key={trade.id}>
                                        <td>#{trade.id}</td>
                                        <td style={{maxWidth: '300px'}}>{trade.market_title}</td>
                                        <td><strong>{trade.side}</strong></td>
                                        <td>{(trade.entry_price * 100).toFixed(0)}¢</td>
                                        <td>{trade.shares?.toFixed(1)}</td>
                                        <td>${trade.cost?.toFixed(2)}</td>
                                        <td>
                                            <span className={`badge badge-${trade.outcome}`}>
                                                {trade.outcome?.toUpperCase()}
                                            </span>
                                        </td>
                                        <td className={trade.pnl >= 0 ? 'pnl-positive' : 'pnl-negative'}>
                                            {trade.pnl !== null ? `$${trade.pnl?.toFixed(2)}` : '-'}
                                        </td>
                                        <td style={{fontSize: '0.85rem', color: '#A0AEC0', maxWidth: '250px'}}>
                                            {trade.notes}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<MyTradesDashboard />, document.getElementById('root'));
    </script>
</body>
</html>
