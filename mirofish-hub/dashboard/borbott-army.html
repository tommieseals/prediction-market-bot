<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BorbottArmy KDP - Clawd Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #FF9900 0%, #FF6600 50%, #CC5200 100%);
            min-height: 100vh;
            color: #fff;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
        }
        .nav-brand h1 { font-size: 1.8rem; }
        .nav-links { display: flex; gap: 1rem; flex-wrap: wrap; }
        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.2); color: #fff; }
        .container { max-width: 1600px; margin: 0 auto; padding: 2rem; }
        .diagram-card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 2rem;
        }
        .diagram-title { text-align: center; margin-bottom: 1.5rem; }
        .diagram-title h2 { color: #FF6600; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .diagram-title p { color: #718096; }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-label { font-size: 0.9rem; opacity: 0.8; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-brand"><h1>📚 BorbottArmy KDP Publishing</h1></div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/projects">Projects</a>
            <a href="/whales">🐋 Whales</a>
            <a href="/kdp" class="active">📚 KDP</a>
        </div>
    </nav>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function AgentNode({ x, y, w, h, title, subtitle, icon, color }) {
            return (
                <g>
                    <rect x={x} y={y} width={w} height={h} rx={12} fill="white" stroke="#E2E8F0" strokeWidth="1" filter="url(#shadow)" />
                    <rect x={x} y={y} width={w} height={6} rx={3} fill={color} />
                    <circle cx={x + w/2} cy={y + 32} r={24} fill={color + "20"} />
                    <text x={x + w/2} y={y + 38} textAnchor="middle" fontSize="26">{icon}</text>
                    <text x={x + w/2} y={y + 68} textAnchor="middle" fill="#1A202C" fontSize="12" fontWeight="600">{title}</text>
                    <text x={x + w/2} y={y + 84} textAnchor="middle" fill="#718096" fontSize="9">{subtitle}</text>
                    <circle cx={x + w - 12} cy={y + 12} r="5" fill="#48BB78">
                        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
                    </circle>
                </g>
            );
        }

        function FlowArrow({ x1, y1, x2, y2, color, delay = 0 }) {
            const pathD = `M ${x1} ${y1} L ${x2} ${y2}`;
            return (
                <g>
                    <defs>
                        <marker id={`arrow-${delay}`} markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                            <path d="M0,0 L0,6 L9,3 z" fill={color} />
                        </marker>
                    </defs>
                    <path d={pathD} fill="none" stroke={color + "60"} strokeWidth="3" strokeDasharray="8,4" markerEnd={`url(#arrow-${delay})`} />
                    <circle r="6" fill={color}>
                        <animateMotion dur="1.5s" repeatCount="indefinite" begin={delay + "s"} path={pathD} />
                    </circle>
                </g>
            );
        }

        function KDPPipeline() {
            return (
                <svg viewBox="0 0 900 280" style={{width: "100%"}}>
                    <defs>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="4" stdDeviation="8" floodOpacity="0.15" />
                        </filter>
                    </defs>

                    {/* Pipeline background */}
                    <rect x="10" y="100" width="880" height="80" rx="40" fill="#FFF5E6" stroke="#FF9900" strokeWidth="2" strokeDasharray="10,5" />
                    <text x="450" y="90" textAnchor="middle" fill="#CC5200" fontSize="14" fontWeight="600">📖 PUBLISHING PIPELINE</text>

                    {/* Agent Nodes */}
                    <AgentNode x={30} y={10} w={130} h={95} title="NicheScout" subtitle="Research" icon="📊" color="#3B82F6" />
                    <AgentNode x={185} y={10} w={130} h={95} title="Analyst" subtitle="Validate" icon="📈" color="#8B5CF6" />
                    <AgentNode x={340} y={10} w={130} h={95} title="Visionary" subtitle="Illustrate" icon="🎨" color="#EC4899" />
                    <AgentNode x={495} y={10} w={130} h={95} title="Architect" subtitle="Layout" icon="📐" color="#10B981" />
                    <AgentNode x={650} y={10} w={130} h={95} title="HypeMan" subtitle="Marketing" icon="📣" color="#F59E0B" />
                    <AgentNode x={760} y={175} w={120} h={95} title="Amazon KDP" subtitle="Publish" icon="📚" color="#FF9900" />

                    {/* Flow arrows */}
                    <FlowArrow x1={160} y1={57} x2={185} y2={57} color="#3B82F6" delay={0} />
                    <FlowArrow x1={315} y1={57} x2={340} y2={57} color="#8B5CF6" delay={0.3} />
                    <FlowArrow x1={470} y1={57} x2={495} y2={57} color="#EC4899" delay={0.6} />
                    <FlowArrow x1={625} y1={57} x2={650} y2={57} color="#10B981" delay={0.9} />
                    <FlowArrow x1={780} y1={105} x2={820} y2={175} color="#F59E0B" delay={1.2} />
                </svg>
            );
        }

        function BorbottDashboard() {
            return (
                <div className="container">
                    <div className="stats-row">
                        <div className="stat-card">
                            <div className="stat-value" style={{color: "#FF6600"}}>5</div>
                            <div className="stat-label">AI Agents</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">100%</div>
                            <div className="stat-label">Automated</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">📚</div>
                            <div className="stat-label">KDP Ready</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value" style={{color: "#48BB78"}}>Active</div>
                            <div className="stat-label">Development</div>
                        </div>
                    </div>

                    <div className="diagram-card">
                        <div className="diagram-title">
                            <h2>📚 BorbottArmy Publishing Pipeline</h2>
                            <p>Multi-agent AI pipeline for publishing illustrated public domain books on Amazon KDP</p>
                        </div>
                        <KDPPipeline />
                    </div>

                    <div className="diagram-card">
                        <div className="diagram-title">
                            <h2>🤖 Agent Squad</h2>
                        </div>
                        <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(250px, 1fr))", gap: "1rem"}}>
                            <div style={{background: "linear-gradient(135deg, #DBEAFE, #BFDBFE)", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #3B82F6"}}>
                                <h3 style={{color: "#1E40AF"}}>📊 NicheScout</h3>
                                <p style={{color: "#1E3A8A", marginTop: "0.5rem"}}>Discovers profitable public domain niches with low competition</p>
                            </div>
                            <div style={{background: "linear-gradient(135deg, #EDE9FE, #DDD6FE)", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #8B5CF6"}}>
                                <h3 style={{color: "#5B21B6"}}>📈 Analyst</h3>
                                <p style={{color: "#4C1D95", marginTop: "0.5rem"}}>Validates market potential and revenue projections</p>
                            </div>
                            <div style={{background: "linear-gradient(135deg, #FCE7F3, #FBCFE8)", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #EC4899"}}>
                                <h3 style={{color: "#BE185D"}}>🎨 Visionary</h3>
                                <p style={{color: "#9D174D", marginTop: "0.5rem"}}>Generates AI illustrations in consistent style</p>
                            </div>
                            <div style={{background: "linear-gradient(135deg, #D1FAE5, #A7F3D0)", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #10B981"}}>
                                <h3 style={{color: "#047857"}}>📐 Architect</h3>
                                <p style={{color: "#065F46", marginTop: "0.5rem"}}>Layouts book interior and generates print-ready PDF</p>
                            </div>
                            <div style={{background: "linear-gradient(135deg, #FEF3C7, #FDE68A)", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #F59E0B"}}>
                                <h3 style={{color: "#B45309"}}>📣 HypeMan</h3>
                                <p style={{color: "#92400E", marginTop: "0.5rem"}}>Creates compelling titles, descriptions, and keywords</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<BorbottDashboard />, document.getElementById("root"));
    </script>
</body>
</html>
