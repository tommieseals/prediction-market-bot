<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBot - Clawd Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 50%, #4C1D95 100%);
            min-height: 100vh;
            color: #fff;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
        }
        .nav-brand h1 { font-size: 1.8rem; }
        .nav-links { display: flex; gap: 1rem; flex-wrap: wrap; }
        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.2); color: #fff; }
        .container { max-width: 1600px; margin: 0 auto; padding: 2rem; }
        .diagram-card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 2rem;
        }
        .diagram-title { text-align: center; margin-bottom: 1.5rem; }
        .diagram-title h2 { color: #6D28D9; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .diagram-title p { color: #718096; }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-label { font-size: 0.9rem; opacity: 0.8; margin-top: 0.5rem; }
        .cta-button {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin: 5px;
            transition: all 0.3s;
        }
        .cta-primary { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .cta-secondary { background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.3); }
        .cta-button:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-brand"><h1>📋 TaskBot</h1></div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/projects">Projects</a>
            <a href="/whales">🐋 Whales</a>
            <a href="taskbot.html" class="active">📋 TaskBot</a>
        </div>
    </nav>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function IntegrationNode({ x, y, icon, label, color }) {
            return (
                <g>
                    <circle cx={x} cy={y} r="35" fill={color + "20"} stroke={color} strokeWidth="2" />
                    <text x={x} y={y} textAnchor="middle" fontSize="24" dominantBaseline="middle">{icon}</text>
                    <text x={x} y={y + 50} textAnchor="middle" fill="#4A5568" fontSize="10" fontWeight="500">{label}</text>
                    <circle cx={x + 25} cy={y - 25} r="6" fill="#48BB78">
                        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
                    </circle>
                </g>
            );
        }

        function DataFlow({ startX, startY, endX, endY, color, delay = 0 }) {
            const midX = (startX + endX) / 2;
            const midY = (startY + endY) / 2;
            const pathD = `M ${startX} ${startY} Q ${midX} ${midY - 30} ${endX} ${endY}`;
            
            return (
                <g>
                    <path d={pathD} fill="none" stroke={color + "40"} strokeWidth="2" strokeDasharray="6,4" />
                    <circle r="4" fill={color}>
                        <animateMotion dur="2s" repeatCount="indefinite" begin={delay + "s"} path={pathD} />
                    </circle>
                </g>
            );
        }

        function TaskBotArchitecture() {
            return (
                <svg viewBox="0 0 900 400" style={{width: "100%"}}>
                    <defs>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="4" stdDeviation="8" floodOpacity="0.15" />
                        </filter>
                    </defs>

                    {/* Central Hub */}
                    <rect x="350" y="140" width="200" height="120" rx="20" fill="white" stroke="#8B5CF6" strokeWidth="3" filter="url(#shadow)" />
                    <rect x="350" y="140" width="200" height="10" rx="5" fill="linear-gradient(90deg, #8B5CF6, #6D28D9)" />
                    <text x="450" y="185" textAnchor="middle" fontSize="36">📋</text>
                    <text x="450" y="215" textAnchor="middle" fill="#1A202C" fontSize="16" fontWeight="700">TaskBot Core</text>
                    <text x="450" y="235" textAnchor="middle" fill="#6D28D9" fontSize="11">GPT-4 AI Builder</text>

                    {/* Left side - Input integrations */}
                    <IntegrationNode x={100} y={80} icon="📧" label="Outlook" color="#0078D4" />
                    <IntegrationNode x={100} y={180} icon="💬" label="Teams" color="#6264A7" />
                    <IntegrationNode x={100} y={280} icon="📁" label="SharePoint" color="#038387" />
                    <IntegrationNode x={100} y={370} icon="☁️" label="OneDrive" color="#0078D4" />

                    {/* Right side - Output integrations */}
                    <IntegrationNode x={800} y={80} icon="🔄" label="Power Auto" color="#0066FF" />
                    <IntegrationNode x={800} y={180} icon="📊" label="Excel" color="#217346" />
                    <IntegrationNode x={800} y={280} icon="💾" label="Database" color="#F7931E" />
                    <IntegrationNode x={800} y={370} icon="🔔" label="Slack" color="#4A154B" />

                    {/* Connecting flows */}
                    <DataFlow startX={135} startY={80} endX={350} endY={180} color="#0078D4" delay={0} />
                    <DataFlow startX={135} startY={180} endX={350} endY={200} color="#6264A7" delay={0.3} />
                    <DataFlow startX={135} startY={280} endX={350} endY={220} color="#038387" delay={0.6} />
                    <DataFlow startX={135} startY={370} endX={350} endY={240} color="#0078D4" delay={0.9} />
                    
                    <DataFlow startX={550} startY={180} endX={765} endY={80} color="#0066FF" delay={0.15} />
                    <DataFlow startX={550} startY={200} endX={765} endY={180} color="#217346" delay={0.45} />
                    <DataFlow startX={550} startY={220} endX={765} endY={280} color="#F7931E" delay={0.75} />
                    <DataFlow startX={550} startY={240} endX={765} endY={370} color="#4A154B" delay={1.05} />

                    {/* Feature badges */}
                    <rect x="280" y="320" width="340" height="60" rx="10" fill="#F0FFF4" stroke="#48BB78" strokeWidth="1" />
                    <text x="310" y="345" fill="#276749" fontSize="11">🤖 AI-Powered</text>
                    <text x="400" y="345" fill="#276749" fontSize="11">⚡ Real-time</text>
                    <text x="480" y="345" fill="#276749" fontSize="11">🔌 13+ APIs</text>
                    <text x="560" y="345" fill="#276749" fontSize="11">📱 Responsive</text>
                    <text x="400" y="365" fill="#276749" fontSize="10" textAnchor="middle">Built with React + Vite + Tailwind</text>
                </svg>
            );
        }

        function TaskBotDashboard() {
            return (
                <div className="container">
                    <div className="stats-row">
                        <div className="stat-card">
                            <div className="stat-value" style={{color: "#10b981"}}>LIVE</div>
                            <div className="stat-label">Status</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">13+</div>
                            <div className="stat-label">Integrations</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">$99</div>
                            <div className="stat-label">/month Pro</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">🚀</div>
                            <div className="stat-label">Deployed</div>
                        </div>
                    </div>

                    <div style={{textAlign: "center", marginBottom: "2rem"}}>
                        <a href="https://included-link-heard-remembered.trycloudflare.com/taskbot-power-automate/#/" target="_blank" className="cta-button cta-primary">🌐 View Live Site</a>
                        <a href="https://github.com/tommieseals/taskbot-power-automate" target="_blank" className="cta-button cta-secondary">📂 GitHub Repo</a>
                    </div>

                    <div className="diagram-card">
                        <div className="diagram-title">
                            <h2>📋 TaskBot Integration Architecture</h2>
                            <p>Enterprise automation platform with GPT-4 AI builder and Microsoft 365 integration</p>
                        </div>
                        <TaskBotArchitecture />
                    </div>

                    <div className="diagram-card">
                        <div className="diagram-title">
                            <h2>✨ Key Features</h2>
                        </div>
                        <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: "1rem"}}>
                            <div style={{background: "#EDE9FE", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #8B5CF6"}}>
                                <h3 style={{color: "#5B21B6"}}>🤖 GPT-4 AI Builder</h3>
                                <p style={{color: "#4C1D95", marginTop: "0.5rem"}}>Natural language workflow creation powered by GPT-4. Describe what you want, AI builds it.</p>
                            </div>
                            <div style={{background: "#DBEAFE", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #3B82F6"}}>
                                <h3 style={{color: "#1E40AF"}}>⚡ Workflow Automation</h3>
                                <p style={{color: "#1E3A8A", marginTop: "0.5rem"}}>Create, schedule, and manage automated tasks with visual workflow designer.</p>
                            </div>
                            <div style={{background: "#D1FAE5", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #10B981"}}>
                                <h3 style={{color: "#047857"}}>📊 Analytics Dashboard</h3>
                                <p style={{color: "#065F46", marginTop: "0.5rem"}}>Real-time monitoring, performance metrics, and execution history.</p>
                            </div>
                            <div style={{background: "#FEF3C7", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #F59E0B"}}>
                                <h3 style={{color: "#B45309"}}>🏢 Power Automate</h3>
                                <p style={{color: "#92400E", marginTop: "0.5rem"}}>Deep integration with Microsoft Power Automate for enterprise workflows.</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<TaskBotDashboard />, document.getElementById("root"));
    </script>
</body>
</html>
