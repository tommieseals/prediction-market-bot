<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure - Clawd Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
        }
        .nav-brand h1 { font-size: 1.8rem; }
        .nav-links { display: flex; gap: 1rem; flex-wrap: wrap; }
        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.2); color: #fff; }
        .container { max-width: 1600px; margin: 0 auto; padding: 2rem; }
        .diagram-card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 2rem;
        }
        .diagram-title { text-align: center; margin-bottom: 1.5rem; }
        .diagram-title h2 { color: #667eea; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .diagram-title p { color: #718096; }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-label { font-size: 0.9rem; opacity: 0.8; margin-top: 0.5rem; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .tab-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
            color: #fff;
            transition: all 0.3s;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.2); }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-brand"><h1>🏗️ Infrastructure</h1></div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/infrastructure" class="active">Infrastructure</a>
            <a href="/agents">Agents</a>
            <a href="/projects">Projects</a>
            <a href="/whales">🐋 Whales</a>
        </div>
    </nav>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function NodeBox({ x, y, w, h, title, subtitle, icon, color, ip, status, specs }) {
            const statusColor = status === "online" ? "#48BB78" : status === "warning" ? "#ECC94B" : "#718096";
            
            return (
                <g>
                    <rect x={x} y={y} width={w} height={h} rx={15} fill="white" stroke="#E2E8F0" strokeWidth="2" filter="url(#shadow)" />
                    <rect x={x} y={y} width={w} height={8} rx={4} fill={color} />
                    
                    {/* Icon and title */}
                    <circle cx={x + w/2} cy={y + 40} r={28} fill={color + "20"} />
                    <text x={x + w/2} y={y + 46} textAnchor="middle" fontSize="30">{icon}</text>
                    <text x={x + w/2} y={y + 80} textAnchor="middle" fill="#1A202C" fontSize="14" fontWeight="700">{title}</text>
                    <text x={x + w/2} y={y + 96} textAnchor="middle" fill={color} fontSize="11" fontWeight="500">{subtitle}</text>
                    
                    {/* IP Address */}
                    <rect x={x + 15} y={y + 108} width={w - 30} height={22} rx={6} fill="#F7FAFC" />
                    <text x={x + w/2} y={y + 122} textAnchor="middle" fill="#4A5568" fontSize="10" fontFamily="monospace">{ip}</text>
                    
                    {/* Specs */}
                    {specs && specs.map((spec, i) => (
                        <text key={i} x={x + w/2} y={y + 145 + (i * 14)} textAnchor="middle" fill="#718096" fontSize="9">{spec}</text>
                    ))}
                    
                    {/* Status indicator */}
                    <circle cx={x + w - 18} cy={y + 18} r="7" fill={statusColor}>
                        <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
                    </circle>
                </g>
            );
        }

        function DataFlow({ x1, y1, x2, y2, color, label, delay = 0, bidirectional = false }) {
            const midX = (x1 + x2) / 2;
            const midY = Math.min(y1, y2) - 20;
            const pathD = `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`;
            const reversePath = `M ${x2} ${y2} Q ${midX} ${midY} ${x1} ${y1}`;
            
            return (
                <g>
                    <path d={pathD} fill="none" stroke={color + "40"} strokeWidth="3" strokeDasharray="8,4" />
                    <circle r="5" fill={color}>
                        <animateMotion dur="2s" repeatCount="indefinite" begin={delay + "s"} path={pathD} />
                    </circle>
                    {bidirectional && (
                        <circle r="4" fill={color} opacity="0.7">
                            <animateMotion dur="2s" repeatCount="indefinite" begin={(delay + 1) + "s"} path={reversePath} />
                        </circle>
                    )}
                    {label && (
                        <text x={midX} y={midY - 8} textAnchor="middle" fill={color} fontSize="9" fontWeight="500">{label}</text>
                    )}
                </g>
            );
        }

        function MultiNodeDiagram() {
            return (
                <svg viewBox="0 0 1000 550" style={{width: "100%"}}>
                    <defs>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="6" stdDeviation="10" floodOpacity="0.15" />
                        </filter>
                        <linearGradient id="tailscaleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stopColor="#667eea" />
                            <stop offset="100%" stopColor="#764ba2" />
                        </linearGradient>
                    </defs>

                    {/* Background zones */}
                    <rect x="20" y="80" width="960" height="140" rx="20" fill="#EBF8FF" opacity="0.3" />
                    <text x="500" y="105" textAnchor="middle" fill="#2B6CB0" fontSize="12" fontWeight="600">🌐 TAILSCALE VPN MESH</text>
                    
                    <rect x="20" y="260" width="480" height="270" rx="20" fill="#F0FFF4" opacity="0.3" />
                    <text x="260" y="285" textAnchor="middle" fill="#276749" fontSize="11" fontWeight="600">📦 LOCAL INFRASTRUCTURE</text>
                    
                    <rect x="520" y="260" width="460" height="270" rx="20" fill="#FAF5FF" opacity="0.3" />
                    <text x="750" y="285" textAnchor="middle" fill="#6B46C1" fontSize="11" fontWeight="600">☁️ CLOUD + REMOTE</text>

                    {/* Main nodes */}
                    <NodeBox x={50} y={300} w={180} h={210} 
                        title="Mac Mini" subtitle="ORCHESTRATOR" icon="🖥️" color="#3B82F6"
                        ip="100.88.105.106" status="online"
                        specs={["Apple Silicon M1", "16GB RAM", "Ollama + Clawdbot", "Dashboard Server"]}
                    />
                    
                    <NodeBox x={280} y={300} w={180} h={210}
                        title="Mac Pro" subtitle="COMPUTE NODE" icon="🖥️" color="#8B5CF6"
                        ip="100.92.123.115" status="online"
                        specs={["Intel Xeon", "32GB RAM", "Ollama (Large)", "Project Legion"]}
                    />
                    
                    <NodeBox x={550} y={300} w={180} h={210}
                        title="Windows Dell" subtitle="WORKSTATION" icon="💻" color="#10B981"
                        ip="100.119.87.108" status="online"
                        specs={["Intel i7", "32GB RAM", "Desktop Control", "TerminatorBot"]}
                    />
                    
                    <NodeBox x={780} y={300} w={180} h={210}
                        title="Google Cloud" subtitle="CLOUD VM" icon="☁️" color="#F59E0B"
                        ip="100.107.231.87" status="online"
                        specs={["n1-standard-2", "7.5GB RAM", "7B Models", "Backup Node"]}
                    />

                    {/* Clawdbot Gateway (center top) */}
                    <rect x="400" y="130" width="200" height="70" rx="35" fill="url(#tailscaleGrad)" />
                    <text x="500" y="160" textAnchor="middle" fill="#fff" fontSize="24">🤖</text>
                    <text x="500" y="185" textAnchor="middle" fill="#fff" fontSize="12" fontWeight="600">Clawdbot Gateway</text>

                    {/* Data flows */}
                    <DataFlow x1={140} y1={300} x2={430} y2={200} color="#3B82F6" label="SSH + API" delay={0} bidirectional={true} />
                    <DataFlow x1={370} y1={300} x2={500} y2={200} color="#8B5CF6" label="Redis" delay={0.5} bidirectional={true} />
                    <DataFlow x1={640} y1={300} x2={530} y2={200} color="#10B981" label="Desktop" delay={1} bidirectional={true} />
                    <DataFlow x1={870} y1={300} x2={570} y2={200} color="#F59E0B" label="API" delay={1.5} bidirectional={true} />
                    
                    {/* Cross-node connections */}
                    <DataFlow x1={230} y1={405} x2={280} y2={405} color="#667eea" delay={0.3} />
                    <DataFlow x1={460} y1={405} x2={550} y2={405} color="#667eea" delay={0.8} />
                    <DataFlow x1={730} y1={405} x2={780} y2={405} color="#667eea" delay={1.3} />

                    {/* Legend */}
                    <rect x="20" y="15" width="200" height="50" rx="10" fill="white" opacity="0.9" />
                    <circle cx="45" cy="32" r="6" fill="#48BB78" />
                    <text x="55" y="36" fill="#276749" fontSize="10">Online</text>
                    <circle cx="105" cy="32" r="6" fill="#ECC94B" />
                    <text x="115" y="36" fill="#B7791F" fontSize="10">Warning</text>
                    <circle cx="170" cy="32" r="6" fill="#718096" />
                    <text x="180" y="36" fill="#4A5568" fontSize="10">Offline</text>
                    <text x="110" y="52" textAnchor="middle" fill="#718096" fontSize="8">Animated = Data Flow</text>
                </svg>
            );
        }

        function InfrastructureDashboard() {
            const [activeTab, setActiveTab] = useState("diagram");

            return (
                <div className="container">
                    <div className="stats-row">
                        <div className="stat-card">
                            <div className="stat-value" style={{color: "#48BB78"}}>4</div>
                            <div className="stat-label">Nodes Online</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">87.5GB</div>
                            <div className="stat-label">Total RAM</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">🔒</div>
                            <div className="stat-label">Tailscale VPN</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value" style={{color: "#667eea"}}>Mesh</div>
                            <div className="stat-label">Topology</div>
                        </div>
                    </div>

                    <div className="tabs">
                        <button className={`tab-btn ${activeTab === "diagram" ? "active" : ""}`} onClick={() => setActiveTab("diagram")}>
                            🏗️ Architecture
                        </button>
                        <button className={`tab-btn ${activeTab === "nodes" ? "active" : ""}`} onClick={() => setActiveTab("nodes")}>
                            📊 Node Details
                        </button>
                    </div>

                    {activeTab === "diagram" && (
                        <div className="diagram-card">
                            <div className="diagram-title">
                                <h2>🌐 Multi-Node AI Infrastructure</h2>
                                <p>Distributed compute mesh with Tailscale VPN connecting 4 nodes across local and cloud</p>
                            </div>
                            <MultiNodeDiagram />
                        </div>
                    )}

                    {activeTab === "nodes" && (
                        <div className="diagram-card">
                            <div className="diagram-title">
                                <h2>📊 Node Details</h2>
                            </div>
                            <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: "1rem"}}>
                                <div style={{background: "#EBF8FF", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #3B82F6"}}>
                                    <h3 style={{color: "#1E40AF"}}>🖥️ Mac Mini (Orchestrator)</h3>
                                    <p style={{color: "#2C5282", marginTop: "0.5rem", fontFamily: "monospace", fontSize: "0.85rem"}}>100.88.105.106</p>
                                    <ul style={{color: "#2B6CB0", marginTop: "0.5rem", paddingLeft: "1.2rem", fontSize: "0.9rem"}}>
                                        <li>Clawdbot Gateway</li>
                                        <li>Dashboard Server (8080)</li>
                                        <li>Ollama (qwen2.5:3b)</li>
                                        <li>Redis + SQLite</li>
                                    </ul>
                                </div>
                                <div style={{background: "#FAF5FF", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #8B5CF6"}}>
                                    <h3 style={{color: "#553C9A"}}>🖥️ Mac Pro (Heavy Compute)</h3>
                                    <p style={{color: "#6B46C1", marginTop: "0.5rem", fontFamily: "monospace", fontSize: "0.85rem"}}>100.92.123.115</p>
                                    <ul style={{color: "#6B46C1", marginTop: "0.5rem", paddingLeft: "1.2rem", fontSize: "0.9rem"}}>
                                        <li>32GB RAM</li>
                                        <li>Large model hosting</li>
                                        <li>Project Legion worker</li>
                                        <li>Browser automation</li>
                                    </ul>
                                </div>
                                <div style={{background: "#F0FFF4", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #10B981"}}>
                                    <h3 style={{color: "#276749"}}>💻 Windows Dell</h3>
                                    <p style={{color: "#2F855A", marginTop: "0.5rem", fontFamily: "monospace", fontSize: "0.85rem"}}>100.119.87.108</p>
                                    <ul style={{color: "#276749", marginTop: "0.5rem", paddingLeft: "1.2rem", fontSize: "0.9rem"}}>
                                        <li>Desktop control (PyAutoGUI)</li>
                                        <li>TerminatorBot</li>
                                        <li>Google Gemini API</li>
                                        <li>Full Code pipeline</li>
                                    </ul>
                                </div>
                                <div style={{background: "#FFFAF0", padding: "1.5rem", borderRadius: "12px", borderLeft: "4px solid #F59E0B"}}>
                                    <h3 style={{color: "#C05621"}}>☁️ Google Cloud</h3>
                                    <p style={{color: "#B7791F", marginTop: "0.5rem", fontFamily: "monospace", fontSize: "0.85rem"}}>100.107.231.87</p>
                                    <ul style={{color: "#B7791F", marginTop: "0.5rem", paddingLeft: "1.2rem", fontSize: "0.9rem"}}>
                                        <li>n1-standard-2</li>
                                        <li>7B model capacity</li>
                                        <li>Backup/overflow node</li>
                                        <li>Always-on availability</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<InfrastructureDashboard />, document.getElementById("root"));
    </script>
</body>
</html>
