<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - No Cache</title>
</head>
<body style="margin:0;padding:30px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;font-family:-apple-system,sans-serif;min-height:100vh">
<div style="text-align:center;max-width:500px;margin:0 auto">
<h1 style="font-size:3rem;margin:40px 0;text-shadow:2px 2px 4px rgba(0,0,0,0.3)">🎉 IT WORKS!</h1>
<div style="background:rgba(255,255,255,0.1);padding:30px;border-radius:20px;backdrop-filter:blur(10px)">
<p style="font-size:1.5rem;margin:20px 0"><strong>✅ Connection Successful!</strong></p>
<p style="font-size:1.2rem;margin:15px 0">Server: 100.82.234.66</p>
<p style="font-size:1.2rem;margin:15px 0">Status: ONLINE</p>
<p style="font-size:1rem;margin:15px 0;opacity:0.8">Timestamp: <span id="t"></span></p>
</div>
<div style="margin-top:30px">
<a href="/mobile-status.html" style="display:block;background:rgba(255,255,255,0.2);padding:20px;margin:15px 0;border-radius:15px;text-decoration:none;color:#fff;font-weight:600;font-size:1.1rem">📱 Mobile Dashboard</a>
<a href="/index.html" style="display:block;background:rgba(255,255,255,0.2);padding:20px;margin:15px 0;border-radius:15px;text-decoration:none;color:#fff;font-weight:600;font-size:1.1rem">💻 Full Dashboard</a>
</div>
</div>
<script>document.getElementById('t').textContent=new Date().toLocaleString();</script>
</body>
</html>
