<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNECTION TEST - SUCCESS!</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .box {
            background: rgba(0,0,0,0.3);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
        }
        h1 { font-size: 3rem; margin: 0 0 20px 0; }
        p { font-size: 1.2rem; line-height: 1.6; }
        .checkmark {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .links {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        a {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }
        a:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="checkmark">✅</div>
        <h1>IT WORKS!</h1>
        <p><strong>Connection successful!</strong></p>
        <p>Your Tailscale network is working perfectly.</p>
        <p style="margin-top: 20px; font-size: 0.9rem; opacity: 0.8;">
            Server: 100.82.234.66<br>
            Time: <span id="time"></span>
        </p>
        <div class="links">
            <a href="/mobile-status.html">📱 Mobile Dashboard</a>
            <a href="/index.html">💻 Full Dashboard</a>
        </div>
    </div>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
