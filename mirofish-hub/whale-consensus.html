<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consensus Picks - Whale Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

/* Header */
.header { background: #1e293b; border-bottom: 1px solid #334155; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: #818cf8; }
.nav-links { display: flex; gap: 16px; }
.nav-links a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 6px; transition: all 0.2s; }
.nav-links a:hover, .nav-links a.active { color: #e2e8f0; background: #334155; }
.header-right { display: flex; align-items: center; gap: 16px; }
.refresh-indicator { font-size: 12px; color: #64748b; }
.live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Summary bar */
.summary-bar { background: #1e293b; padding: 12px 24px; display: flex; gap: 24px; align-items: center; border-bottom: 1px solid #334155; flex-wrap: wrap; }
.tier-badge { padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; }
.tier-GREEN { background: rgba(34,197,94,0.15); color: #22c55e; }
.tier-YELLOW { background: rgba(234,179,8,0.15); color: #eab308; }
.tier-RED { background: rgba(239,68,68,0.15); color: #ef4444; }

/* Portfolio heat */
.heat-bar { display: flex; gap: 12px; margin-left: auto; font-size: 13px; }
.heat-item { display: flex; align-items: center; gap: 4px; }
.heat-item.warning { color: #f59e0b; }
.heat-item .bar { width: 60px; height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
.heat-item .bar-fill { height: 100%; border-radius: 3px; }
.heat-item .bar-fill.ok { background: #22c55e; }
.heat-item .bar-fill.warning { background: #f59e0b; }

/* Filters */
.filter-bar { padding: 12px 24px; display: flex; gap: 8px; border-bottom: 1px solid #1e293b; }
.filter-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #334155; background: transparent; color: #94a3b8; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.filter-btn:hover { border-color: #818cf8; color: #c7d2fe; }
.filter-btn.active { background: #818cf8; color: #fff; border-color: #818cf8; }

/* Main content */
.main { padding: 16px 24px; }
.tier-section { margin-bottom: 24px; }
.tier-header { font-size: 15px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }

/* Pick card */
.pick-card { background: #1e293b; border-radius: 10px; padding: 16px; margin-bottom: 10px; border-left: 4px solid transparent; cursor: pointer; transition: all 0.2s; }
.pick-card:hover { background: #263348; }
.pick-card.GREEN { border-left-color: #22c55e; }
.pick-card.YELLOW { border-left-color: #eab308; }
.pick-card.RED { border-left-color: #ef4444; }

.pick-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.pick-title { font-size: 16px; font-weight: 600; color: #f1f5f9; }
.pick-confidence { font-size: 22px; font-weight: 700; }
.pick-confidence.GREEN { color: #22c55e; }
.pick-confidence.YELLOW { color: #eab308; }
.pick-confidence.RED { color: #ef4444; }

.pick-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: #94a3b8; }
.pick-meta .label { color: #64748b; }

.confidence-bar { width: 100%; height: 4px; background: #334155; border-radius: 2px; margin-top: 8px; overflow: hidden; }
.confidence-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.confidence-fill.GREEN { background: #22c55e; }
.confidence-fill.YELLOW { background: #eab308; }
.confidence-fill.RED { background: #ef4444; }

.pick-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; }
.tag-cat { background: rgba(99,102,241,0.15); color: #a5b4fc; }
.tag-miro { background: rgba(34,197,94,0.15); color: #22c55e; }
.tag-miro.disagrees { background: rgba(239,68,68,0.15); color: #ef4444; }
.tag-miro.pending { background: rgba(100,116,139,0.15); color: #94a3b8; }
.tag-related { background: rgba(234,179,8,0.15); color: #eab308; }

/* Whale detail (expanded) */
.whale-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #334155; }
.whale-detail.open { display: block; }
.whale-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; font-size: 13px; }
.whale-name { min-width: 140px; font-weight: 500; }
.whale-side { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.whale-side.YES { background: rgba(34,197,94,0.15); color: #22c55e; }
.whale-side.NO { background: rgba(239,68,68,0.15); color: #ef4444; }
.whale-fade { color: #f59e0b; font-size: 11px; }
.whale-tracked { color: #64748b; font-size: 11px; }

/* Buttons */
.btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #334155; background: transparent; color: #94a3b8; cursor: pointer; font-size: 12px; transition: all 0.2s; }
.btn:hover { border-color: #818cf8; color: #c7d2fe; }
.btn-sim { border-color: #6366f1; color: #a5b4fc; }
.btn-sim:hover { background: #6366f1; color: #fff; }

/* Loading */
.loading { text-align: center; padding: 60px; color: #64748b; }
.no-data { text-align: center; padding: 40px; color: #64748b; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:16px;">
    <h1><span>CONSENSUS</span> PICKS</h1>
    <div class="nav-links">
      <a href="/">Tracker</a>
      <a href="/leaderboard">Leaderboard</a>
      <a href="/consensus" class="active">Consensus</a>
      <a href="/analytics">Analytics</a>
      <a href="/consensus#results" onclick="document.querySelector('[data-filter=results]').click();return false;" style="color:#22c55e;font-weight:600;">Track Record</a>
    </div>
  </div>
  <div class="header-right">
    <span class="refresh-indicator"><span class="live-dot"></span> Auto-refresh 60s</span>
  </div>
</div>

<div class="summary-bar" id="summaryBar">
  <span class="tier-badge tier-GREEN" id="greenCount">GREEN: --</span>
  <span class="tier-badge tier-YELLOW" id="yellowCount">YELLOW: --</span>
  <span class="tier-badge tier-RED" id="redCount">RED: --</span>
  <div class="heat-bar" id="heatBar"></div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All Picks</button>
  <button class="filter-btn" data-filter="GREEN">GREEN Only</button>
  <button class="filter-btn" data-filter="YELLOW">YELLOW</button>
  <button class="filter-btn" data-filter="sports">Sports</button>
  <button class="filter-btn" data-filter="crypto">Crypto</button>
  <button class="filter-btn" data-filter="esports">Esports</button>
  <button class="filter-btn" data-filter="soccer">Soccer</button>
  <button class="filter-btn" data-filter="results" style="margin-left:auto;background:#334155;color:#22c55e;font-weight:600;">Results</button>
  <button class="filter-btn" data-filter="mytrades" style="background:#334155;color:#eab308;font-weight:600;">My Trades</button>
</div>

<div class="main" id="mainContent">
  <div class="loading">Loading consensus data...</div>
</div>

<script>
const API_BASE = '';

let allPicks = [];
let activeFilter = 'all';

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    if (activeFilter === 'results') {
      fetchResults();
    } else if (activeFilter === 'mytrades') {
      fetchMyTrades();
    } else {
      renderPicks();
    }
  });
});

function filterPicks(picks) {
  if (activeFilter === 'all') return picks;
  if (['GREEN', 'YELLOW', 'RED'].includes(activeFilter))
    return picks.filter(p => p.confidence_tier === activeFilter);
  return picks.filter(p => p.category === activeFilter);
}

async function fetchData() {
  try {
    const [consRes, heatRes] = await Promise.all([
      fetch(`${API_BASE}/api/consensus?min_whales=3&limit=100`),
      fetch(`${API_BASE}/api/portfolio/heat`)
    ]);
    const consData = await consRes.json();
    const heatData = await heatRes.json();

    allPicks = consData.picks || [];

    // Update summary
    document.getElementById('greenCount').textContent = `GREEN: ${consData.summary?.green || 0}`;
    document.getElementById('yellowCount').textContent = `YELLOW: ${consData.summary?.yellow || 0}`;
    document.getElementById('redCount').textContent = `RED: ${consData.summary?.red || 0}`;

    // Portfolio heat
    renderHeat(heatData);
    renderPicks();
  } catch (e) {
    document.getElementById('mainContent').innerHTML =
      `<div class="no-data">Failed to load data. Is the API running?<br><small>${e.message}</small></div>`;
  }
}

function renderHeat(data) {
  const bar = document.getElementById('heatBar');
  const cats = data.by_category || {};
  bar.innerHTML = Object.entries(cats).map(([cat, info]) => {
    const cls = info.status === 'WARNING' ? 'warning' : '';
    const fillCls = info.status === 'WARNING' ? 'warning' : 'ok';
    return `<div class="heat-item ${cls}">
      <span>${cat}</span>
      <div class="bar"><div class="bar-fill ${fillCls}" style="width:${Math.min(info.exposure_pct, 100)}%"></div></div>
      <span>${info.exposure_pct}%</span>
    </div>`;
  }).join('');
}

function renderPicks() {
  const container = document.getElementById('mainContent');
  const filtered = filterPicks(allPicks);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-data">No consensus picks match your filters.</div>';
    return;
  }

  // Group by tier
  const green = filtered.filter(p => p.confidence_tier === 'GREEN');
  const yellow = filtered.filter(p => p.confidence_tier === 'YELLOW');
  const red = filtered.filter(p => p.confidence_tier === 'RED');

  let html = '';
  if (green.length > 0) html += renderTier('HIGH CONFIDENCE', 'GREEN', green);
  if (yellow.length > 0) html += renderTier('MEDIUM CONFIDENCE', 'YELLOW', yellow);
  if (red.length > 0) html += renderTier('LOWER CONFIDENCE', 'RED', red);

  container.innerHTML = html;

  // Attach expand handlers
  container.querySelectorAll('.pick-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.btn')) return;
      const detail = card.querySelector('.whale-detail');
      if (detail) detail.classList.toggle('open');
    });
  });
}

function renderTier(label, tier, picks) {
  return `
    <div class="tier-section">
      <div class="tier-header">
        <span class="tier-badge tier-${tier}">${tier}</span>
        ${label} (${picks.length})
      </div>
      ${picks.map(renderCard).join('')}
    </div>`;
}

function renderCard(pick) {
  const miroClass = pick.mirofish_status === 'confirmed' ? '' :
                    pick.mirofish_status === 'disagrees' ? 'disagrees' : 'pending';
  const miroLabel = pick.mirofish_status === 'confirmed' ? `MiroFish: ${pick.mirofish_prob}% [Confirmed]` :
                    pick.mirofish_status === 'disagrees' ? `MiroFish: ${pick.mirofish_prob}% [Disagrees]` :
                    'MiroFish: Not validated';

  const relatedTag = pick.related_markets?.length > 0
    ? `<span class="tag tag-related">Related: ${pick.related_markets.length}</span>` : '';

  return `
    <div class="pick-card ${pick.confidence_tier}">
      <div class="pick-top">
        <div>
          <div class="pick-title">${pick.market_title || 'Unknown Market'}</div>
          <div class="pick-meta">
            <span>${pick.whale_count} whales: ${pick.yes_count}Y / ${pick.no_count}N (${pick.agreement_pct}% ${pick.consensus_side})</span>
            <span><span class="label">Elite:</span> ${pick.avg_elite_score}</span>
            <span><span class="label">Size:</span> $${Number(pick.total_size_usd).toLocaleString()}</span>
            <span><span class="label">Avg Entry:</span> $${pick.avg_entry_price}</span>
            <span><span class="label">Kelly:</span> ${(pick.kelly_fraction * 100).toFixed(1)}%</span>
            <span><span class="label">First whale:</span> ${pick.hours_since_first_whale}h ago</span>
            ${pick.end_date ? `<span><span class="label">Expires:</span> ${pick.end_date.split('T')[0]}</span>` : ''}
          </div>
        </div>
        <div class="pick-confidence ${pick.confidence_tier}">${pick.confidence_pct}%</div>
      </div>
      <div class="confidence-bar">
        <div class="confidence-fill ${pick.confidence_tier}" style="width:${pick.confidence_pct}%"></div>
      </div>
      <div class="pick-tags">
        <span class="tag tag-cat">${pick.category}</span>
        <span class="tag tag-miro ${miroClass}">${miroLabel}</span>
        ${relatedTag}
      </div>
      <div class="whale-detail">
        ${(pick.whales || []).map(w => {
          const fadeWarn = w.signal_direction === 'FADE'
            ? '<span class="whale-fade">FADE</span>' : '';
          const tracked = w.tracked_acc !== 'new'
            ? `<span class="whale-tracked">(${w.tracked_bets} bets, ${w.tracked_acc})</span>`
            : '<span class="whale-tracked">(new)</span>';
          return `<div class="whale-row">
            <span class="whale-name">${w.name}</span>
            <span class="whale-side ${w.side}">${w.side}</span>
            <span>@ $${w.entry}</span>
            <span>$${Number(w.size).toLocaleString()}</span>
            <span>Elite ${w.elite}</span>
            ${tracked}
            ${fadeWarn}
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

// ── RESULTS TAB ──────────────────────────────────────────
async function fetchResults() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="loading">Loading results...</div>';
  try {
    const res = await fetch(`${API_BASE}/api/consensus/history`);
    const data = await res.json();
    renderResults(data);
  } catch (e) {
    main.innerHTML = `<div class="no-data">Failed to load results. <small>${e.message}</small></div>`;
  }
}

function renderResults(data) {
  const main = document.getElementById('mainContent');
  const picks = data.picks || [];
  const summary = data.summary || {};

  const resolved = picks.filter(p => p.outcome === 'won' || p.outcome === 'lost');
  const pending = picks.filter(p => p.outcome === 'pending');
  const wins = resolved.filter(p => p.outcome === 'won').length;
  const losses = resolved.filter(p => p.outcome === 'lost').length;
  const totalPnl = resolved.reduce((s, p) => s + (p.profit_loss || 0), 0);
  const winRate = resolved.length > 0 ? (wins / resolved.length * 100).toFixed(1) : '0.0';

  let html = `
    <div style="padding:24px;">
      <div style="display:flex;gap:24px;margin-bottom:24px;flex-wrap:wrap;">
        <div style="background:#1e293b;padding:16px 24px;border-radius:12px;border:1px solid #334155;min-width:120px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:${totalPnl >= 0 ? '#22c55e' : '#ef4444'}">$${totalPnl.toFixed(0)}</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px;">Total P&L</div>
        </div>
        <div style="background:#1e293b;padding:16px 24px;border-radius:12px;border:1px solid #334155;min-width:120px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:#818cf8">${winRate}%</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px;">Win Rate</div>
        </div>
        <div style="background:#1e293b;padding:16px 24px;border-radius:12px;border:1px solid #334155;min-width:120px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:#22c55e">${wins}</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px;">Wins</div>
        </div>
        <div style="background:#1e293b;padding:16px 24px;border-radius:12px;border:1px solid #334155;min-width:120px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:#ef4444">${losses}</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px;">Losses</div>
        </div>
        <div style="background:#1e293b;padding:16px 24px;border-radius:12px;border:1px solid #334155;min-width:120px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:#94a3b8">${pending.length}</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px;">Pending</div>
        </div>
      </div>

      <h3 style="margin-bottom:12px;color:#e2e8f0;">Resolved Picks</h3>
      <table style="width:100%;border-collapse:collapse;font-size:14px;">
        <thead>
          <tr style="border-bottom:1px solid #334155;color:#94a3b8;text-align:left;">
            <th style="padding:8px;">Result</th>
            <th style="padding:8px;">Market</th>
            <th style="padding:8px;">Our Pick</th>
            <th style="padding:8px;">Confidence</th>
            <th style="padding:8px;">Whales</th>
            <th style="padding:8px;text-align:right;">P&L</th>
          </tr>
        </thead>
        <tbody>`;

  for (const p of resolved) {
    const isWin = p.outcome === 'won';
    const icon = isWin ? '<span style="color:#22c55e;font-weight:700;">WIN</span>' : '<span style="color:#ef4444;font-weight:700;">LOSS</span>';
    const pnl = p.profit_loss || 0;
    const pnlColor = pnl >= 0 ? '#22c55e' : '#ef4444';
    const pnlStr = pnl >= 0 ? `+$${pnl.toFixed(0)}` : `-$${Math.abs(pnl).toFixed(0)}`;

    html += `<tr style="border-bottom:1px solid #1e293b;">
      <td style="padding:8px;">${icon}</td>
      <td style="padding:8px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.market_title || ''}</td>
      <td style="padding:8px;"><span style="color:${p.side === 'YES' ? '#22c55e' : '#ef4444'};font-weight:600;">${p.side || '?'}</span> @ $${(p.avg_entry_price || 0).toFixed(2)}</td>
      <td style="padding:8px;">${p.confidence || 0}%</td>
      <td style="padding:8px;">${p.whale_count || 0}</td>
      <td style="padding:8px;text-align:right;color:${pnlColor};font-weight:600;">${pnlStr}</td>
    </tr>`;
  }

  html += `</tbody></table>`;

  if (pending.length > 0) {
    html += `<h3 style="margin:24px 0 12px;color:#e2e8f0;">Pending (${pending.length})</h3>
    <div style="display:flex;flex-wrap:wrap;gap:8px;">`;
    for (const p of pending.slice(0, 20)) {
      html += `<div style="background:#1e293b;padding:6px 12px;border-radius:8px;font-size:12px;border:1px solid #334155;">
        <span style="color:${p.side === 'YES' ? '#22c55e' : '#ef4444'}">${p.side}</span>
        ${(p.market_title || '').substring(0, 35)}...
        <span style="color:#64748b">${p.confidence || 0}%</span>
      </div>`;
    }
    html += '</div>';
  }

  html += '</div>';
  main.innerHTML = html;
}

// ── MY TRADES TAB ──────────────────────────────────────
async function fetchMyTrades() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="loading">Loading your trades...</div>';
  try {
    const [tradesRes, portfolioRes] = await Promise.all([
      fetch(`${API_BASE}/api/my-trades`),
      fetch(`${API_BASE}/api/portfolio`)
    ]);
    const tradesData = await tradesRes.json();
    const portfolioData = await portfolioRes.json();
    renderMyTrades(tradesData, portfolioData);
  } catch (e) {
    main.innerHTML = `<div class="no-data">Failed to load trades. <small>${e.message}</small></div>`;
  }
}

function renderMyTrades(data, portfolio = {}) {
  const main = document.getElementById('mainContent');
  const trades = data.trades || [];
  const s = data.summary || {};
  const w = portfolio.wallet || {};
  const cash = portfolio.cash_balance || 0;
  const posValue = portfolio.positions_value || 0;
  const totalValue = portfolio.total_portfolio_value || 0;

  let html = `
    <div style="padding:24px;">
      <!-- PORTFOLIO BALANCE SECTION -->
      <div style="background:linear-gradient(135deg, #1e293b 0%, #0f172a 100%);border:2px solid #6366f1;border-radius:16px;padding:20px;margin-bottom:24px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h2 style="color:#818cf8;margin:0;font-size:18px;">💰 Portfolio Balance</h2>
          <span style="color:#64748b;font-size:12px;">Wallet: ${portfolio.wallet ? '0x299a...c728' : 'Not connected'}</span>
        </div>
        <div style="display:flex;gap:24px;flex-wrap:wrap;">
          <div style="text-align:center;min-width:120px;">
            <div style="font-size:32px;font-weight:700;color:#22c55e;">$${totalValue.toFixed(2)}</div>
            <div style="font-size:12px;color:#64748b;margin-top:4px;">Total Value</div>
          </div>
          <div style="text-align:center;min-width:100px;">
            <div style="font-size:24px;font-weight:600;color:#818cf8;">$${cash.toFixed(2)}</div>
            <div style="font-size:12px;color:#64748b;margin-top:4px;">Cash (USDC)</div>
          </div>
          <div style="text-align:center;min-width:100px;">
            <div style="font-size:24px;font-weight:600;color:#eab308;">$${posValue.toFixed(2)}</div>
            <div style="font-size:12px;color:#64748b;margin-top:4px;">In Positions</div>
          </div>
          <div style="text-align:center;min-width:100px;">
            <div style="font-size:24px;font-weight:600;color:${(portfolio.realized_pnl || 0) >= 0 ? '#22c55e' : '#ef4444'};">$${(portfolio.realized_pnl || 0).toFixed(2)}</div>
            <div style="font-size:12px;color:#64748b;margin-top:4px;">Realized P&L</div>
          </div>
          <div style="text-align:center;min-width:80px;">
            <div style="font-size:20px;font-weight:600;color:#94a3b8;">${w.matic || 0}</div>
            <div style="font-size:12px;color:#64748b;margin-top:4px;">MATIC (gas)</div>
          </div>
        </div>
      </div>
      
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="color:#eab308;margin:0;">My Trades</h2>
        <button onclick="showAddTradeForm()" style="background:#eab308;color:#0f172a;border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;">+ Log Trade</button>
      </div>
      <div id="addTradeForm" style="display:none;background:#1e293b;padding:16px;border-radius:12px;border:1px solid #334155;margin-bottom:20px;">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:end;">
          <div><label style="font-size:11px;color:#64748b;">Market</label><br><input id="tf_market" style="background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:6px 10px;border-radius:6px;width:250px;" placeholder="e.g. Lakers vs Celtics"></div>
          <div><label style="font-size:11px;color:#64748b;">Side</label><br><select id="tf_side" style="background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:6px 10px;border-radius:6px;"><option>YES</option><option>NO</option></select></div>
          <div><label style="font-size:11px;color:#64748b;">Entry $</label><br><input id="tf_entry" type="number" step="0.01" style="background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:6px 10px;border-radius:6px;width:80px;" placeholder="0.49"></div>
          <div><label style="font-size:11px;color:#64748b;">Shares</label><br><input id="tf_shares" type="number" style="background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:6px 10px;border-radius:6px;width:80px;" placeholder="25"></div>
          <div><label style="font-size:11px;color:#64748b;">Notes</label><br><input id="tf_notes" style="background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:6px 10px;border-radius:6px;width:200px;" placeholder="Optional"></div>
          <button onclick="submitTrade()" style="background:#22c55e;color:#0f172a;border:none;padding:8px 16px;border-radius:6px;font-weight:600;cursor:pointer;">Save</button>
        </div>
      </div>

      <div style="display:flex;gap:24px;margin-bottom:24px;flex-wrap:wrap;">
        <div style="background:#1e293b;padding:16px 24px;border-radius:12px;border:1px solid #334155;min-width:120px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:${s.total_pnl >= 0 ? '#22c55e' : '#ef4444'}">$${(s.total_pnl || 0).toFixed(0)}</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px;">My P&L</div>
        </div>
        <div style="background:#1e293b;padding:16px 24px;border-radius:12px;border:1px solid #334155;min-width:120px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:#eab308">${s.win_rate || 0}%</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px;">Win Rate</div>
        </div>
        <div style="background:#1e293b;padding:16px 24px;border-radius:12px;border:1px solid #334155;min-width:100px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:#22c55e">${s.won || 0}</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px;">Wins</div>
        </div>
        <div style="background:#1e293b;padding:16px 24px;border-radius:12px;border:1px solid #334155;min-width:100px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:#ef4444">${s.lost || 0}</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px;">Losses</div>
        </div>
        <div style="background:#1e293b;padding:16px 24px;border-radius:12px;border:1px solid #334155;min-width:100px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:#94a3b8">${s.pending || 0}</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px;">Pending</div>
        </div>
        ${s.unredeemed > 0 ? `<div style="background:#1e293b;padding:16px 24px;border-radius:12px;border:2px solid #eab308;min-width:100px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:#eab308">${s.unredeemed}</div>
          <div style="font-size:12px;color:#eab308;margin-top:4px;">Unredeemed!</div>
        </div>` : ''}
      </div>

      <table style="width:100%;border-collapse:collapse;font-size:14px;">
        <thead>
          <tr style="border-bottom:1px solid #334155;color:#94a3b8;text-align:left;">
            <th style="padding:8px;">Result</th>
            <th style="padding:8px;">Market</th>
            <th style="padding:8px;">My Pick</th>
            <th style="padding:8px;">Entry</th>
            <th style="padding:8px;">Shares</th>
            <th style="padding:8px;text-align:right;">P&L</th>
            <th style="padding:8px;">Notes</th>
          </tr>
        </thead>
        <tbody>`;

  for (const t of trades) {
    const isWin = t.outcome === 'won';
    const isLost = t.outcome === 'lost';
    const isPending = t.outcome === 'pending';
    const icon = isWin ? '<span style="color:#22c55e;font-weight:700;">WIN</span>'
                 : isLost ? '<span style="color:#ef4444;font-weight:700;">LOSS</span>'
                 : '<span style="color:#94a3b8;">PENDING</span>';
    const pnl = t.pnl || 0;
    const pnlColor = pnl >= 0 ? '#22c55e' : '#ef4444';
    const pnlStr = isPending ? '-' : (pnl >= 0 ? `+$${pnl.toFixed(2)}` : `-$${Math.abs(pnl).toFixed(2)}`);
    const redeemBadge = isWin && !t.redeemed ? ' <span style="color:#eab308;font-size:11px;">[REDEEM]</span>' : '';

    html += `<tr style="border-bottom:1px solid #1e293b;">
      <td style="padding:8px;">${icon}${redeemBadge}</td>
      <td style="padding:8px;">${t.market_title || ''}</td>
      <td style="padding:8px;"><span style="color:${t.side === 'YES' ? '#22c55e' : '#ef4444'};font-weight:600;">${t.side}</span></td>
      <td style="padding:8px;">$${(t.entry_price || 0).toFixed(2)}</td>
      <td style="padding:8px;">${t.shares || 0}</td>
      <td style="padding:8px;text-align:right;color:${pnlColor};font-weight:600;">${pnlStr}</td>
      <td style="padding:8px;color:#64748b;font-size:12px;">${t.notes || ''}</td>
    </tr>`;
  }

  html += '</tbody></table>';
  if (trades.length === 0) {
    html += '<div class="no-data">No trades logged yet. Click "+ Log Trade" to add your first trade.</div>';
  }
  html += '</div>';
  main.innerHTML = html;
}

function showAddTradeForm() {
  const form = document.getElementById('addTradeForm');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function submitTrade() {
  const trade = {
    market_title: document.getElementById('tf_market').value,
    side: document.getElementById('tf_side').value,
    entry_price: parseFloat(document.getElementById('tf_entry').value) || 0,
    shares: parseInt(document.getElementById('tf_shares').value) || 0,
    notes: document.getElementById('tf_notes').value,
  };
  if (!trade.market_title || !trade.entry_price) {
    alert('Market name and entry price are required');
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/api/my-trades`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(trade),
    });
    const data = await res.json();
    if (data.id) {
      document.getElementById('addTradeForm').style.display = 'none';
      fetchMyTrades();
    } else {
      alert('Error: ' + (data.error || 'Unknown'));
    }
  } catch (e) {
    alert('Failed to save: ' + e.message);
  }
}

// Initial load + auto-refresh
fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
